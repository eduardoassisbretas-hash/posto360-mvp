<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar | Posto360</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap");

        :root {
            --bg: #06111f;
            --bg-accent: radial-gradient(circle at top, rgba(37, 99, 235, 0.22), transparent 34%), radial-gradient(circle at 85% 10%, rgba(16, 185, 129, 0.16), transparent 22%), linear-gradient(180deg, #08111d 0%, #040914 100%);
            --panel: rgba(10, 19, 35, 0.92);
            --border: rgba(148, 163, 184, 0.16);
            --text: #f8fafc;
            --muted: #94a3b8;
            --primary: #38bdf8;
            --primary-strong: #2563eb;
            --danger: #fecaca;
            --shadow: 0 24px 70px rgba(2, 6, 23, 0.42);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Manrope", "Segoe UI", sans-serif;
            background: var(--bg);
            background-image: var(--bg-accent);
            color: var(--text);
            padding: 20px;
        }

        .auth-card {
            width: min(480px, 100%);
            border: 1px solid var(--border);
            background: var(--panel);
            box-shadow: var(--shadow);
            border-radius: 28px;
            padding: 24px;
            display: grid;
            gap: 18px;
        }

        .eyebrow {
            display: inline-flex;
            width: fit-content;
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #dbeafe;
            background: rgba(37, 99, 235, 0.16);
            border: 1px solid rgba(96, 165, 250, 0.22);
        }

        h1 {
            font-family: "Space Grotesk", "Manrope", sans-serif;
            font-size: clamp(2rem, 8vw, 3rem);
            letter-spacing: -0.03em;
            line-height: 1;
        }

        p { color: var(--muted); line-height: 1.6; }

        form { display: grid; gap: 14px; }

        label {
            display: grid;
            gap: 8px;
            color: #dbeafe;
            font-weight: 800;
            font-size: 0.94rem;
        }

        input {
            width: 100%;
            min-height: 52px;
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(15, 23, 42, 0.72);
            color: var(--text);
            padding: 0 14px;
            outline: none;
        }

        button,
        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 52px;
            border-radius: 16px;
            font-weight: 800;
            text-decoration: none;
        }

        button {
            border: none;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-strong) 100%);
            color: #eff6ff;
            cursor: pointer;
        }

        a { color: #dbeafe; border: 1px solid var(--border); background: rgba(15, 23, 42, 0.6); }

        .error {
            padding: 12px 14px;
            border-radius: 16px;
            border: 1px solid rgba(248, 113, 113, 0.34);
            background: rgba(127, 29, 29, 0.28);
            color: var(--danger);
            font-weight: 800;
        }

        @media (min-width: 640px) {
            .auth-card { padding: 30px; }
        }
    </style>
</head>
<body>
    <main class="auth-card">
        <span class="eyebrow">Posto360</span>
        <div>
            <h1>Entrar</h1>
            <p>Acesse sua rede para acompanhar preços, leituras e oportunidades.</p>
        </div>
        {% if erro %}
        <div class="error">{{ erro }}</div>
        {% endif %}
        <form action="/login" method="post">
            <label>
                Email
                <input type="email" name="email" autocomplete="email" required>
            </label>
            <label>
                Senha
                <input type="password" name="senha" autocomplete="current-password" required>
            </label>
            <button type="submit">Entrar</button>
            <a href="/register">Criar conta</a>
        </form>
    </main>
</body>
</html>
