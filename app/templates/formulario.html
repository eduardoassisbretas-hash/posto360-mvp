<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="icon" type="image/png" href="/static/favicon.png?v=1">
    <link rel="apple-touch-icon" href="/static/favicon.png?v=1">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário | Posto360</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap");

        :root {
            --bg: #06111f;
            --bg-accent: radial-gradient(circle at top, rgba(37, 99, 235, 0.22), transparent 34%), radial-gradient(circle at 85% 10%, rgba(16, 185, 129, 0.16), transparent 22%), linear-gradient(180deg, #08111d 0%, #040914 100%);
            --panel: rgba(10, 19, 35, 0.92);
            --border: rgba(148, 163, 184, 0.16);
            --text: #f8fafc;
            --muted: #94a3b8;
            --primary: #38bdf8;
            --primary-strong: #2563eb;
            --shadow: 0 24px 70px rgba(2, 6, 23, 0.42);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: "Manrope", "Segoe UI", sans-serif;
            background: var(--bg);
            background-image: var(--bg-accent);
            color: var(--text);
            padding: 12px;
        }

        .page {
            width: min(720px, 100%);
            margin: 0 auto;
            display: grid;
            gap: 12px;
        }

        .hero,
        .panel {
            border: 1px solid var(--border);
            background: var(--panel);
            box-shadow: var(--shadow);
            backdrop-filter: blur(16px);
            border-radius: 24px;
        }

        .hero {
            padding: 18px;
        }

        .eyebrow {
            display: inline-flex;
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #dbeafe;
            background: rgba(37, 99, 235, 0.16);
            border: 1px solid rgba(96, 165, 250, 0.22);
            margin-bottom: 14px;
        }

        h1,
        h2 {
            font-family: "Space Grotesk", "Manrope", sans-serif;
            letter-spacing: -0.03em;
        }

        h1 {
            font-size: clamp(1.9rem, 7vw, 3rem);
            line-height: 1.05;
            margin-bottom: 12px;
        }

        p {
            color: var(--muted);
            line-height: 1.55;
        }

        .panel {
            padding: 18px;
        }

        form {
            display: grid;
            gap: 16px;
        }

        .field {
            display: grid;
            gap: 8px;
        }

        label {
            font-size: 0.94rem;
            font-weight: 700;
            color: #dbeafe;
        }

        input,
        select {
            width: 100%;
            min-height: 56px;
            padding: 0 14px;
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(15, 23, 42, 0.72);
            color: var(--text);
            outline: none;
            font: inherit;
            font-size: 16px;
        }

        input::placeholder {
            color: #64748b;
        }

        input:focus,
        select:focus {
            border-color: rgba(56, 189, 248, 0.7);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.12);
        }

        .actions {
            display: grid;
            gap: 12px;
            margin-top: 4px;
        }

        .btn-primary,
        .btn-secondary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 54px;
            padding: 0 18px;
            border-radius: 16px;
            font-weight: 700;
            text-decoration: none;
            transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
        }

        .btn-primary {
            border: none;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-strong) 100%);
            color: #eff6ff;
            cursor: pointer;
        }

        .btn-secondary {
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.6);
            color: #dbeafe;
        }

        .btn-primary:hover,
        .btn-secondary:hover {
            transform: translateY(-1px);
        }

        a:focus-visible,
        button:focus-visible,
        input:focus-visible,
        select:focus-visible {
            outline: 3px solid rgba(56, 189, 248, 0.34);
            outline-offset: 3px;
        }

        @media (min-width: 720px) {
            body {
                padding: 24px;
            }

            .hero,
            .panel {
                padding: 24px;
            }

            .actions {
                grid-template-columns: 1fr auto;
            }
        }
    </style>
</head>
<body>
    {% set postos = postos if postos is defined else [] %}
    <main class="page">
        <section class="hero">
            <span class="eyebrow">Entrada manual</span>
            <h1>Nova análise</h1>
            <p>Preencha os dados da operação para calcular a autonomia estimada e atualizar o dashboard do Posto360.</p>
        </section>

        <section class="panel">
            <form action="/formulario" method="post">
                {% if postos %}
                <div class="field">
                    <label for="station_id">Posto cadastrado</label>
                    <select id="station_id" name="station_id">
                        <option value="">Selecionar manualmente abaixo</option>
                        {% for posto in postos %}
                        <option value="{{ posto.id }}">{{ posto.nome }}</option>
                        {% endfor %}
                    </select>
                </div>
                {% endif %}
                <div class="field">
                    <label for="posto">Posto</label>
                    <input id="posto" type="text" name="posto" placeholder="Ex: Posto Centro" required>
                </div>

                <div class="field">
                    <label for="regiao">Regiao</label>
                    <input id="regiao" type="text" name="regiao" placeholder="Ex: Centro, Savassi" required>
                </div>

                <div class="field">
                    <label for="produto">Produto</label>
                    <input id="produto" type="text" name="produto" placeholder="Ex: Gasolina" required>
                </div>

                <div class="field">
                    <label for="preco">Preço por litro</label>
                    <input id="preco" type="number" step="0.01" name="preco" placeholder="Ex: 5.89" required>
                </div>

                <div class="field">
                    <label for="litros_vendidos">Litros vendidos</label>
                    <input id="litros_vendidos" type="number" step="0.01" name="litros_vendidos" placeholder="Ex: 5200" required>
                </div>

                <div class="field">
                    <label for="litros_estoque">Litros em estoque</label>
                    <input id="litros_estoque" type="number" step="0.01" name="litros_estoque" placeholder="Ex: 18000" required>
                </div>

                <div class="actions">
                    <button type="submit" class="btn-primary">Salvar e analisar</button>
                    <a href="/dashboard" class="btn-secondary">Voltar ao dashboard</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
